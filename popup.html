<!doctype html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Prime Wallet</title>

    <!--
      Firefox-specific sizing rules.

      Both Firefox surfaces (popup and sidebar) load this same popup.html,
      but they have very different sizing behaviour:

        - **Popup** auto-sizes its window to fit <html>'s rendered size.
          Without a hint it collapses to 5 px height (we used to ship a
          fixed `width:480px; height:600px` to fix that).
        - **Sidebar** is user-resizable — width is whatever the user
          dragged the panel to (200-1500+ px). A FIXED width here means
          the wallet renders at 480 px while the sidebar might be 1000 px,
          leaving dead space and making buttons look "cut off" relative to
          the surrounding chrome.

      Solution — `min-*` only, no fixed `width`/`height`:

        - Popup  : Firefox picks the content's intrinsic size, clamped to
                   our min (480 × 600). Result is a clean 480×600 popup.
        - Sidebar: content fills whatever width the user gave the panel.
                   `max-width: 720px` + `margin:0 auto` cap the wallet at
                   720 px and centre it inside ultra-wide sidebars, so the
                   brutalist layout doesn't sprawl on a 4K monitor.

      Chrome side panel (which never matches `@-moz-document url-prefix()`)
      is unaffected — it continues to flow freely inside its iframe.
    -->
    <style id="fx-popup-sizing">

        @-moz-document url-prefix() {
            html {
                min-width: 400px;
                min-height: 600px;
                height: 600px;
            }
            body {
                min-width: 400px;
                min-height: 600px;
                max-width: 400px;
                height: 600px;
                margin: 0 auto;
                overflow: hidden;
            }
        }
    </style>

    <!--
      PRIME boot splash (extension popup / side panel). Identical to the
      PWA `index.html` splash — see that file for full design rationale.
      Removed by `src/main.ts` immediately after Vue mounts.
    -->
    <style id="prime-boot-css">
        #prime-boot-container {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #121315;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 99999;
            font-family: "JetBrains Mono", "SF Mono", Menlo, monospace;
            color: #e25822;
            overflow: hidden;
        }

        .boot-terminal-box {
            border: 1px dashed #374151;
            padding: 16px;
            background-color: #1a1c1e;
            width: 280px;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.5);
        }

        .boot-title {
            font-size: 14px;
            font-weight: bold;
            letter-spacing: 2px;
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        .boot-status {
            font-size: 10px;
            color: #9ca3af;
            display: flex;
            justify-content: space-between;
            letter-spacing: 0.06em;
        }

        .boot-progress-bar {
            height: 3px;
            background-color: #374151;
            margin-top: 12px;
            position: relative;
            overflow: hidden;
        }

        .boot-progress-bar::after {
            content: "";
            position: absolute;
            left: -50%;
            top: 0;
            height: 100%;
            width: 50%;
            background: linear-gradient(90deg, transparent, #e25822, transparent);
            animation: hammer-scan 1.5s infinite linear;
        }

        @keyframes hammer-scan {
            0% {
                left: -50%;
            }
            100% {
                left: 100%;
            }
        }
    </style>

    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
    <link
            href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap"
            rel="stylesheet"
    />
</head>
<body class="extension-shell">
<!-- Splash mounts pre-Vue and is yanked from the DOM by main.ts. -->
<div id="prime-boot-container" aria-hidden="true">
    <div class="boot-terminal-box">
        <div class="boot-title">▲ PRIME CORE</div>
        <div class="boot-status">
            <span>INITIALIZING SECURE VAULT...</span>
        </div>
        <div class="boot-progress-bar"></div>
    </div>
</div>

<div id="app"></div>
<script type="module" src="/src/main.ts"></script>
</body>
</html>
